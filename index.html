<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-in Terminal</title>
    <style>
      body { background-color: black; color: #00ff00; margin: 0; padding: 0; }
    </style>
    <script>
      console.log("[SYSTEM] HTML_LOADED", window.location.href);
      console.log("[SYSTEM] BASE_URI", document.baseURI);
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.error("[SYSTEM] RUNTIME_ERROR", msg, url, lineNo);
        var div = document.createElement('div');
        div.style.color = 'red';
        div.style.padding = '20px';
        div.style.fontFamily = 'monospace';
        div.innerHTML = '[ERROR] ' + msg + '<br>at ' + url + ':' + lineNo + ':' + columnNo;
        document.body.appendChild(div);
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root">
      <div style="background: black; color: green; font-family: monospace; padding: 20px;">
        [SYSTEM] INITIALIZING_TERMINAL...
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
